name: Build submit binary

on:
  push:
    paths:
      - 'src/submit.py'
      - 'build/**'
      - '.github/workflows/build-submit.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build binary
        run: bash build/build.sh

      - name: Verify binary
        run: |
          file ./submit
          ./submit --help 2>&1 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: submit-linux-x86_64
          path: ./submit
